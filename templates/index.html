<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>CasaFood</title>

<style>

body{
background:#f2f5f9;
}

.card{
border-radius:15px;
}

</style>

</head>

<body>

<div class="container py-4">

<h1 class="text-center mb-4">🏠 CasaFood</h1>

<div class="row">

<div class="col-md-6">

<div class="card shadow mb-4">

<div class="card-header bg-success text-white">
📦 Estoque
</div>

<ul class="list-group list-group-flush">

{% for item in estoque %}

<li class="list-group-item d-flex justify-content-between align-items-center">

<div>

<strong>{{item[1]}}</strong>

<span class="badge bg-secondary ms-2">
{{item[3]}}
</span>

<span class="badge bg-dark ms-1">
Qtd {{item[2]}}
</span>

</div>

<div>

<a href="/menos/{{item[0]}}" class="btn btn-sm btn-warning">-</a>

<a href="/mais/{{item[0]}}" class="btn btn-sm btn-success">+</a>

<a href="/comprar/{{item[0]}}" class="btn btn-sm btn-primary">Comprar</a>

<a href="/delete/{{item[0]}}" class="btn btn-sm btn-danger">✖</a>

</div>

</li>

{% endfor %}

</ul>

<div class="card-body">

<form action="/add" method="post">

<div class="mb-2">

<input name="nome" class="form-control" placeholder="Novo item">

</div>

<select name="categoria" class="form-select mb-2">

<option value="geladeira">Geladeira</option>
<option value="freezer">Freezer</option>
<option value="despensa">Despensa</option>

</select>

<button class="btn btn-success w-100">
Adicionar no estoque
</button>

</form>

</div>

</div>

</div>

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-primary text-white">
🛒 Lista de Compras
</div>

<ul class="list-group list-group-flush">

{% for item in compras %}

<li class="list-group-item d-flex justify-content-between">

{{item[1]}}

<div>

<a href="/comprado/{{item[0]}}" class="btn btn-sm btn-success">
Comprado
</a>

<a href="/delete_compra/{{item[0]}}" class="btn btn-sm btn-danger">
✖
</a>

</div>

</li>

{% endfor %}

</ul>

<div class="card-body">

<form action="/add_compra" method="post">

<div class="input-group">

<input name="nome" class="form-control" placeholder="Adicionar compra">

<button class="btn btn-primary">
Adicionar
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
